spring:
  application:
    name: contract-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:contract}}
    username: ${DB_USERNAME:contract}
    password: ${DB_PASSWORD:contract}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 64MB

app:
  # Authentication mode:
  #   dev = validate local HS256 tokens minted by /api/v1/dev/token (demo, current deploy)
  #   sso = validate RS256 tokens from VATM IdentityServer (set issuer-uri + run WITHOUT the dev
  #         profile so /dev/token is disabled). Claim names + role mapping are configurable so the
  #         app adapts to VATM's token without code changes.
  auth:
    mode: ${APP_AUTH_MODE:dev}
    issuer-uri: ${APP_AUTH_ISSUER_URI:https://sso.vatm.vn}
    unit-claim: ${APP_AUTH_UNIT_CLAIM:unit}
    # role-claims / role-mappings can be overridden here once VATM's role names are known, e.g.:
    #   role-claims: [role]
    #   role-mappings:
    #     "vatm-contract-admin": ADMIN
    #     "vatm-contract-unithead": UNIT_HEAD
  # Comma-separated origins allowed to call the API (the web app in dev).
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  # Local/dev symmetric JWT secret. Production federates to VATM SSO/AD via issuer-uri/JWKS.
  jwt:
    secret: ${APP_JWT_SECRET:dev-secret-change-me-please-with-a-long-random-value-0001}
  attachment:
    max-size-bytes: ${APP_ATTACHMENT_MAX_SIZE:52428800} # 50 MB (FR-010)
  workflow:
    # A contract that is flagged official OR whose value is >= this threshold requires TCT
    # approval before becoming ACTIVE (FR-013). Default 100,000,000 VND.
    tct-approval-threshold: ${APP_TCT_APPROVAL_THRESHOLD:100000000}
  report:
    # Window (days) used to flag contracts as "nearing expiry" (FR-016/FR-018).
    nearing-expiry-days: ${APP_NEARING_EXPIRY_DAYS:30}
  alert:
    # "Nearing expiry" window (days) for alert evaluation (FR-016).
    nearing-expiry-days: ${APP_ALERT_NEARING_EXPIRY_DAYS:30}
    # Cron for the scheduled evaluation pass; default hourly on the hour.
    cron: ${APP_ALERT_CRON:0 0 * * * *}
  storage:
    # minio (default) | filesystem | memory. Free-tier deploys use filesystem.
    type: ${APP_STORAGE_TYPE:minio}
    dir: ${APP_STORAGE_DIR:./attachments}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:contracts}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  # Render (and most PaaS) inject the port via $PORT.
  port: ${PORT:8080}
